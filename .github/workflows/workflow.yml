# GitHub Action workflow that runs on push to main branch
# Docker build and push the album-api image to ACR

name: Build and Push Album API Docker Image to ACR
on:
  push:
    branches:
      - main  
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}     
      - name: Build and push Docker image
        uses: docker/build-push-action@v2   
        with:
          context: .
          file: ./albums-api/Dockerfile
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/album-api:latest
          build-args: |
            ACR_LOGIN_SERVER=${{ secrets.ACR_LOGIN_SERVER }}  
      # tag the image with the GitHub run id and push to docker hub
      - name: Tag and push to Docker Hub
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./albums-api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/album-api:${{ github.run_id }}
          build-args: |
            ACR_LOGIN_SERVER=${{ secrets.ACR_LOGIN_SERVER }}
      # run tests on the album-api image
      - name: Run tests on album-api image
        run: |
          docker run --rm ${{ secrets.ACR_LOGIN_SERVER }}/album-api:latest dotnet test /app/tests/AlbumApi.Tests/AlbumApi.Tests.csproj
      # deploy the album-api image to the dev AKS cluster
      - name: Deploy to AKS
        uses: azure/aks-set-context@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
      # find and replace the %%VERSION%% by the GitHub action run id in every appmanifest.yml file
      - name: Update appmanifest.yml with new image tag
        run: |
          find . -name "appmanifest.yml" -exec sed -i "s/%%VERSION%%/${{ github.run_id }}/g" {} \;
      # deploy the album-api image to the dev AKS cluster using the appmanifest.yml file
      - name: Deploy to AKS using appmanifest.yml
        run: |
          find . -name "appmanifest.yml" -exec kubectl apply -f {} \;
          